name: OTA Update (Push to Phones)

on:
  push:
    branches: [main]
    paths:
      - "InventoryApp/**"
      - ".github/workflows/ota-update.yml"

  workflow_dispatch:
    inputs:
      message:
        description: "Update message"
        required: false
        default: "Bug fixes and improvements"

jobs:
  ota-update:
    name: Push OTA Update
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: ota-update-main
      cancel-in-progress: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_TOKEN_PRIMARY: ${{ secrets.FULLSTACK }}
      EXPO_TOKEN_SECONDARY: ${{ secrets.FULLSTACK2 }}
      EXPO_TOKEN_TERTIARY: ${{ secrets.EXPO_TOKEN }}
      EXPO_TOKEN_QUATERNARY: ${{ secrets.EXPO_TOKEN_2 }}
    defaults:
      run:
        working-directory: InventoryApp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: InventoryApp/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          eas-cache: false

      - name: Validate Expo token exists
        run: |
          if [ -z "${EXPO_TOKEN_PRIMARY}" ] && [ -z "${EXPO_TOKEN_SECONDARY}" ] && [ -z "${EXPO_TOKEN_TERTIARY}" ] && [ -z "${EXPO_TOKEN_QUATERNARY}" ]; then
            echo "No Expo token found in secrets FULLSTACK/FULLSTACK2/EXPO_TOKEN/EXPO_TOKEN_2."
            exit 1
          fi

      - name: Select authorized Expo account
        shell: bash
        run: |
          set -euo pipefail
          TOKENS=("${EXPO_TOKEN_PRIMARY}" "${EXPO_TOKEN_SECONDARY}" "${EXPO_TOKEN_TERTIARY}" "${EXPO_TOKEN_QUATERNARY}")
          OWNER="aamircf"
          SELECTED=""
          for token in "${TOKENS[@]}"; do
            if [ -z "$token" ]; then
              continue
            fi
            export EXPO_TOKEN="$token"
            USERNAME="$(eas whoami 2>/dev/null || true)"
            if [ -n "$USERNAME" ]; then
              echo "Token login detected: $USERNAME"
            fi
            # Ownership rule: app owner is aamirksa, so direct owner token is preferred.
            if [ "$USERNAME" = "$OWNER" ]; then
              SELECTED="$token"
              break
            fi
            # Fallback: collaborator token may still have access to this project.
            if eas project:info --non-interactive >/dev/null 2>&1; then
              SELECTED="$token"
              break
            fi
          done

          if [ -z "$SELECTED" ]; then
            echo "No provided token can access Expo project e6076914-b4b5-459d-b12b-7f478259ceea (owner aamircf)."
            echo "Add owner token to one of: FULLSTACK, FULLSTACK2, EXPO_TOKEN, EXPO_TOKEN_2"
            exit 1
          fi

          {
            echo "EXPO_TOKEN=$SELECTED"
          } >> "$GITHUB_ENV"

      - name: Push OTA update with retries (preview)
        shell: bash
        run: |
          set -euo pipefail
          eas whoami
          MSG="${{ github.event.inputs.message || format('Auto OTA: {0}', github.event.head_commit.message) }}"
          for attempt in 1 2 3; do
            echo "Preview OTA attempt ${attempt}/3"
            if eas update --branch preview --message "$MSG" --non-interactive; then
              echo "Preview OTA succeeded"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 20))
            fi
          done
          echo "Preview OTA failed after 3 attempts"
          exit 1

      - name: Push OTA update with retries (production)
        shell: bash
        run: |
          set -euo pipefail
          eas whoami
          MSG="${{ github.event.inputs.message || format('Auto OTA: {0}', github.event.head_commit.message) }}"
          for attempt in 1 2 3; do
            echo "Production OTA attempt ${attempt}/3"
            if eas update --branch production --message "$MSG" --non-interactive; then
              echo "Production OTA succeeded"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 20))
            fi
          done
          echo "Production OTA failed after 3 attempts"
          exit 1
