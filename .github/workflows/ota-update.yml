name: OTA Update (Push to Phones)

on:
  push:
    branches: [main]
    paths:
      - "InventoryApp/**"
      - ".github/workflows/ota-update.yml"

  workflow_dispatch:
    inputs:
      message:
        description: "Update message"
        required: false
        default: "Bug fixes and improvements"

jobs:
  ota-update:
    name: Push OTA Update
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: ota-update-main
      cancel-in-progress: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: InventoryApp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: InventoryApp/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          eas-cache: false
          token: ${{ secrets.FULLSTACK }}

      - name: Validate Expo token exists
        run: |
          if [ -z "${{ secrets.FULLSTACK }}" ]; then
            echo "FULLSTACK secret is missing. Set an Expo access token in repository secrets."
            exit 1
          fi

      - name: Push OTA update with retries (preview)
        shell: bash
        run: |
          set -euo pipefail
          MSG="${{ github.event.inputs.message || format('Auto OTA: {0}', github.event.head_commit.message) }}"
          for attempt in 1 2 3; do
            echo "Preview OTA attempt ${attempt}/3"
            if eas update --branch preview --message "$MSG" --non-interactive; then
              echo "Preview OTA succeeded"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 20))
            fi
          done
          echo "Preview OTA failed after 3 attempts"
          exit 1

      - name: Push OTA update with retries (production)
        shell: bash
        run: |
          set -euo pipefail
          MSG="${{ github.event.inputs.message || format('Auto OTA: {0}', github.event.head_commit.message) }}"
          for attempt in 1 2 3; do
            echo "Production OTA attempt ${attempt}/3"
            if eas update --branch production --message "$MSG" --non-interactive; then
              echo "Production OTA succeeded"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 20))
            fi
          done
          echo "Production OTA failed after 3 attempts"
          exit 1
