name: OTA Update (Push to Phones)

on:
  push:
    branches: [main]
    paths:
      - "InventoryApp/**"
      - ".github/workflows/ota-update.yml"

  workflow_dispatch:
    inputs:
      message:
        description: "Update message"
        required: false
        default: "Bug fixes and improvements"

jobs:
  ota-update:
    name: Push OTA Update
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: InventoryApp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: InventoryApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.FULLSTACK }}

      - name: Push OTA update to preview channel
        run: |
          eas update \
            --branch preview \
            --message "${{ github.event.inputs.message || format('Auto OTA: {0}', github.event.head_commit.message) }}" \
            --non-interactive

      - name: Push OTA update to production channel
        run: |
          eas update \
            --branch production \
            --message "${{ github.event.inputs.message || format('Auto OTA: {0}', github.event.head_commit.message) }}" \
            --non-interactive
