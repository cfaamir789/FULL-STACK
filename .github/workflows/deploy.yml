name: Auto Deploy to Render

on:
  push:
    branches: [main]

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "Render auto-deploys on every push to main via GitHub integration."
          echo "If auto-deploy is ever disabled, re-enable it in Render → Settings → Build & Deploy → Auto Deploy."
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered at: $(date -u)"
