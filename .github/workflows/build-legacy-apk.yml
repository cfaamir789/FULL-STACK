name: Build Legacy Scanner APK

on:
  push:
    paths:
      - "InventoryLegacyScanner/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x InventoryLegacyScanner/gradlew

      - name: Build Debug APK (installable)
        working-directory: InventoryLegacyScanner
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: InventoryLegacyScanner-debug
          path: InventoryLegacyScanner/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 90
