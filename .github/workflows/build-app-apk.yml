name: Build Inventory App APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "InventoryApp/**"
      - ".github/workflows/build-app-apk.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build APK (local Gradle)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    defaults:
      run:
        working-directory: InventoryApp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: InventoryApp/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/configuration-cache
          key: gradle-${{ hashFiles('InventoryApp/package.json') }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ hashFiles('InventoryApp/package.json') }}-
            gradle-

      - name: Install JS dependencies
        run: npm ci

      - name: Prebuild native Android project
        env:
          NODE_ENV: production
          CI: "1"
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK locally
        env:
          NODE_ENV: production
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            --build-cache \
            --parallel \
            --configuration-cache \
            -x lintVitalRelease \
            -x testReleaseUnitTest

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: InventoryApp-release-apk
          path: InventoryApp/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Read version
        id: version
        working-directory: ${{ github.workspace }}
        run: |
          VERSION=$(node -p "require('./InventoryApp/app.json').expo.version")
          CODE=$(node -p "require('./InventoryApp/app.json').expo.android.versionCode")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: "Inventory Manager v${{ steps.version.outputs.version }} (Build #${{ github.run_number }})"
          body: |
            ### Inventory Manager APK
            - **Version**: ${{ steps.version.outputs.version }}
            - **Version Code**: ${{ steps.version.outputs.code }}
            - **Commit**: ${{ github.sha }}
            - **Built via**: GitHub Actions local Gradle build

            Download the APK below and install on any Android device.
          files: InventoryApp/android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
