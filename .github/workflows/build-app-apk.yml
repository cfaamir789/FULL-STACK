name: Build Inventory App APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "InventoryApp/**"
      - ".github/workflows/build-app-apk.yml"
  workflow_dispatch:

jobs:
  build:
    name: EAS Build (expo.dev)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    defaults:
      run:
        working-directory: InventoryApp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: InventoryApp/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Validate Expo token
        run: |
          if [ -z "" ]; then
            echo "ERROR: GitHub secret FULLSTACK is not set."
            echo "Go to: https://github.com/cfaamir789/FULL-STACK/settings/secrets/actions"
            echo "Add secret  name=FULLSTACK  value=<your aamirksa Expo token>"
            echo "Get token at: https://expo.dev/accounts/aamirksa/settings/access-tokens"
            exit 1
          fi
          echo "Token present - proceeding."
        env:
          EXPO_TOKEN: ${{ secrets.FULLSTACK }}

      - name: Setup EAS CLI and authenticate
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          eas-cache: false
          token: ${{ secrets.FULLSTACK }}

      - name: Trigger EAS build and wait
        id: eas_build
        run: |
          set -euo pipefail
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait \
            --json \
            2>&1 | tee /tmp/eas_output.txt

          APK_URL=$(node -e "
            const fs = require('fs');
            const text = fs.readFileSync('/tmp/eas_output.txt', 'utf8');
            const arrMatch = text.match(/\[[\s\S]*\]/);
            if (arrMatch) {
              const arr = JSON.parse(arrMatch[0]);
              const b = Array.isArray(arr) ? arr[0] : arr;
              const url = b.artifacts?.buildUrl || b.artifacts?.applicationArchiveUrl;
              if (url) { console.log(url); process.exit(0); }
            }
            const objMatches = [...text.matchAll(/\{[^{}]+\}/g)];
            for (const m of objMatches.reverse()) {
              try {
                const d = JSON.parse(m[0]);
                const url = d.artifacts?.buildUrl;
                if (url) { console.log(url); process.exit(0); }
              } catch {}
            }
          " 2>/dev/null || echo "")

          if [ -z "$APK_URL" ]; then
            APK_URL=$(eas build:list --platform android --status FINISHED --limit 1 --non-interactive --json 2>/dev/null \
              | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));const b=Array.isArray(d)?d[0]:d;console.log(b?.artifacts?.buildUrl||'')" || echo "")
          fi

          echo "APK URL: $APK_URL"
          echo "apk_url=$APK_URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        working-directory: /tmp
        run: |
          URL="${{ steps.eas_build.outputs.apk_url }}"
          if [ -z "$URL" ]; then echo "No APK URL found"; exit 1; fi
          curl -L -o app-release.apk "$URL"
          ls -lh app-release.apk

      - name: Read version
        id: version
        working-directory: ${{ github.workspace }}
        run: |
          VERSION=$(node -p "require('./InventoryApp/app.json').expo.version")
          CODE=$(node -p "require('./InventoryApp/app.json').expo.android.versionCode")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: "Inventory Manager v${{ steps.version.outputs.version }} (Build #${{ github.run_number }})"
          body: |
            ### Inventory Manager APK
            - **Version**: ${{ steps.version.outputs.version }}
            - **Version Code**: ${{ steps.version.outputs.code }}
            - **Commit**: ${{ github.sha }}
            - **Built via**: EAS on expo.dev
            - **EAS builds**: https://expo.dev/accounts/aamirksa/projects/newfullstack/builds

            Download the APK below and install on any Android device.
          files: /tmp/app-release.apk
          draft: false
          prerelease: false
