<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000033"/>
    </filter>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef5350"/>
      <stop offset="100%" style="stop-color:#b71c1c"/>
    </linearGradient>
  </defs>
  <!-- Blue ribbon — left leg + arch of A -->
  <path d="M 30 80 Q 25 50 50 18 Q 58 10 65 16 Q 72 24 60 32 Q 50 38 46 55 L 52 55 Q 54 48 62 42 Q 74 34 70 22 Q 80 30 72 50 Q 68 62 60 72 L 54 65 Q 58 55 56 48 L 44 48 Q 40 62 36 80 Z"
        fill="url(#blueGrad)" filter="url(#shadow)"/>
  <!-- Red ribbon — right leg + crossbar sweep -->
  <path d="M 68 80 Q 60 60 52 55 L 44 55 Q 38 58 30 80 L 38 80 Q 44 62 50 58 Q 56 62 62 80 Z
           M 36 52 Q 50 44 64 50 Q 58 56 50 54 Q 44 56 36 52 Z"
        fill="url(#redGrad)" filter="url(#shadow)"/>
  <!-- Red tail -->
  <path d="M 64 68 Q 70 76 74 88 Q 78 95 72 94 Q 68 90 64 80 Z"
        fill="url(#redGrad)"/>
</svg>
